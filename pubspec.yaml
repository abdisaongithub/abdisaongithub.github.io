name: flutter_portfolio_app
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.1.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  equatable: ^2.0.5

  flutter_svg: ^2.0.7
  flutter_bloc: ^8.1.3
  dio: ^5.3.3
  flutter_dotenv: ^5.1.0
  get_it: ^7.6.4
  google_fonts: 6.1.0
  smooth_page_indicator: ^1.1.0

  flutter_native_splash: ^2.3.2
  shared_preferences: ^2.2.1

  validators: ^3.0.0
  timer_count_down: ^2.2.2
  intl: any
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  url_launcher: ^6.1.14

  go_router: ^17.0.1
  flutter_resizable_container: ^4.2.0

  font_awesome_flutter: ^10.12.0
  uuid: ^4.5.2
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  freezed: ^2.4.3
  json_serializable: ^6.7.1
  flutter_lints: ^2.0.3

flutter:

  uses-material-design: true

  assets:
    - assets/projects/
    - assets/icons/
    - assets/icons/android/
    - assets/icons/windows/
    - assets/images/
    - assets/svg/

